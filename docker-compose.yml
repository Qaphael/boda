version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: boda-postgres
    environment:
      POSTGRES_USER: boda
      POSTGRES_PASSWORD: boda123
      POSTGRES_DB: boda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: boda-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
